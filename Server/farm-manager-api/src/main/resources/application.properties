spring.application.name=FarmManager

spring.config.import=optional:file:.env[.properties]
# ===============================
# SERVER PORT
# ===============================
server.port=8080

# ===============================
# DATABASE CONNECTION (Using .env)
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# FIX: Giữ nguyên tên bảng như trong @Table(name="Crops"), không convert lowercase
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
# Tắt open-in-view warning
spring.jpa.open-in-view=false

# Tắt Thymeleaf template check (không dùng template)
spring.thymeleaf.check-template-location=false